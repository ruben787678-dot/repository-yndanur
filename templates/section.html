<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ section.title }} — Հատուկ անուններ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Armenian:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
  :root { --accent: {{ section.color }}; --bg:#f8f9fa; --shadow:0 2px 16px rgba(0,0,0,.08); --radius:14px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:#2c2c2c; }
 .topnav { position:sticky; top:0; z-index:100; background:#fff; border-bottom:1px solid #eee; display:flex; align-items:center; gap:16px; padding:12px 24px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
 .topnav a.back { display:inline-flex; align-items:center; gap:8px; text-decoration:none; color:var(--accent); font-weight:700; font-size:.9rem; font-family:'Noto Serif Armenian',serif; }
 .topnav.nav-title { font-family:'Noto Serif Armenian',serif; font-weight:700; font-size:1rem; color:#333; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
 .nav-links { display:flex; gap:8px; flex-wrap:wrap; }
 .nav-links a { font-size:.78rem; padding:5px 12px; border-radius:20px; text-decoration:none; background:#f0f0f0; color:#555; font-weight:500; transition:background.2s; }
 .nav-links a:hover,.nav-links a.active { background:var(--accent); color:white; }
 .section-hero { background:linear-gradient(135deg, {{ section.color }}, {{ section.color }}99); color:white; padding:56px 24px 64px; text-align:center; }
 .section-hero.emoji { font-size:4rem; margin-bottom:16px; display:block; }
 .section-hero h1 { font-family:'Noto Serif Armenian',serif; font-size:clamp(2rem,7vw,3.5rem); font-weight:700; text-shadow:0 2px 12px rgba(0,0,0,.2); margin-bottom:16px; }
 .section-hero.pages-badge { display:inline-block; background:rgba(255,255,255,.25); border:2px solid rgba(255,255,255,.5); border-radius:50px; padding:6px 22px; font-size:.85rem; font-weight:700; backdrop-filter:blur(6px); font-family:'Noto Serif Armenian',serif; }
 .content-wrap { max-width:860px; margin:0 auto; padding:40px 20px 80px; }
 .letter-section { display:flex; gap:20px; margin-bottom:24px; align-items:flex-start; background:white; border-radius:12px; padding:16px 20px; box-shadow:var(--shadow); }
 .letter { flex-shrink:0; width:44px; height:44px; background:var(--accent); color:white; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Noto Serif Armenian',serif; font-size:1.3rem; font-weight:700; }
 .letter-section ul { list-style:none; padding:0; flex:1; }
 .letter-section ul li { padding:5px 0; border-bottom:1px solid #f0f0f0; font-size:.95rem; color:#333; line-height:1.5; font-family:'Noto Serif Armenian',serif; }
 .letter-section ul li:last-child { border-bottom:none; }
 .letter-section ul li::before { content:'•'; color:var(--accent); font-weight:700; margin-right:8px; }
 .empty-note { color:#bbb; font-style:italic; font-size:.9rem; padding:5px 0; font-family:'Noto Serif Armenian',serif; }
 .bilingual-list { background:white; border-radius:12px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:24px; }
 .bilingual-item { display:flex; border-bottom:1px solid #f0f0f0; }
 .bilingual-item:last-child { border-bottom:none; }
 .bilingual-item span { flex:1; padding:12px 18px; font-size:.92rem; }
 .lang-en,.lang-ru { display:none; }
 .lang-am { color:#2e7d32; font-family:'Noto Serif Armenian',serif; }
 .rule-box { background:linear-gradient(135deg,#fff8e1,#fffde7); border-left:4px solid #ffc107; border-radius:10px; padding:16px 20px; margin-bottom:20px; font-size:.92rem; line-height:1.7; color:#5d4037; font-family:'Noto Serif Armenian',serif; }
 .rule-box strong { color:#e65100; }
 .section-divider { border:none; height:2px; background:linear-gradient(90deg, {{ section.color }}33, transparent); margin:36px 0 28px; }
 .content-wrap h3 { font-family:'Noto Serif Armenian',serif; font-size:1.25rem; color:var(--accent); margin:32px 0 16px; padding-bottom:8px; border-bottom:2px solid {{ section.color }}33; }
 .content-wrap h4 { font-family:'Noto Serif Armenian',serif; font-size:1rem; font-weight:700; color:#444; margin:28px 0 14px; display:flex; align-items:center; gap:8px; }
 .content-wrap h4::before { content:''; width:4px; height:18px; background:var(--accent); border-radius:2px; display:inline-block; }
 .content-wrap h5 { font-family:'Noto Serif Armenian',serif; font-size:.9rem; font-weight:600; color:#666; margin:20px 0 10px; text-transform:uppercase; letter-spacing:1px; }
 .bottom-nav { background:white; border-top:1px solid #eee; padding:24px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
 .bottom-nav a { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:50px; text-decoration:none; font-size:.88rem; font-weight:600; background:#f0f0f0; color:#555; transition:all.2s; font-family:'Noto Serif Armenian',serif; }
 .bottom-nav a:hover { background:var(--accent); color:white; }
</style>
</head>
<body>
<nav class="topnav">
  <a class="back" href="/">← Գլխավոր էջ</a>
  <span class="nav-title">{{ section.emoji }} {{ section.title }}</span>
  <div class="nav-links">
    {% for id, s in sections.items() %}
    <a href="/section/{{ id }}" class="{{ 'active' if id == section_id else '' }}">{{ s.emoji }}</a>
    {% endfor %}
  </div>
</nav>
<div class="section-hero">
  <span class="emoji">{{ section.emoji }}</span>
  <h1>{{ section.title }}</h1>
  <span class="pages-badge">Էջ {{ section.pages }}</span>
</div>
<div class="content-wrap">{{ section.content | safe }}</div>
<div class="bottom-nav">
  {% for id, s in sections.items() %}
  <a href="/section/{{ id }}" style="{{ 'background:' + s.color + '; color:white;' if id == section_id else '' }}">
    {{ s.emoji }} {{ s.title }}
  </a>
  {% endfor %}
  <a href="/">🏠 Գլխավոր էջ</a>
</div>
</body>
</html>
